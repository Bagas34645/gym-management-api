components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token. Dapatkan dari POST /auth/login

  parameters:
    UuidPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: OK }
        data: {}
        meta:
          type: object
          properties:
            page: { type: integer }
            per_page: { type: integer }
            total: { type: integer }
    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        error_code: { type: string, nullable: true }
        errors: { type: object }
    WorkoutLogInput:
      type: object
      required: [exercises, duration_minutes]
      properties:
        workout_plan_id: { type: string, format: uuid }
        exercises:
          type: array
          minItems: 1
          items:
            type: object
            required: [exercise_name, sets, reps]
            properties:
              exercise_name: { type: string }
              sets: { type: integer, minimum: 1 }
              reps: { type: integer, minimum: 1 }
              weight_kg: { type: number }
        duration_minutes: { type: integer, minimum: 1 }
        notes: { type: string }
        logged_at: { type: string, format: date-time }
    MembershipPackageInput:
      type: object
      required: [name, type, duration_days, price]
      properties:
        name: { type: string }
        type: { type: string, enum: [daily, weekly, monthly, yearly] }
        duration_days: { type: integer, minimum: 1 }
        price: { type: number, minimum: 0 }
        description: { type: string }
        benefits: { type: array, items: { type: string } }
        status: { type: string, enum: [active, inactive] }
    TrainerInput:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        specialization: { type: string }
        experience_years: { type: integer }
        hourly_rate: { type: number }
        bio: { type: string }
        certification: { type: string }

  responses:
    Success:
      description: Operasi berhasil
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessEnvelope"
    PaginatedSuccess:
      description: Daftar dengan paginasi
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessEnvelope"
    ValidationError:
      description: Validasi gagal
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Token tidak valid atau tidak ada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Akses ditolak (role atau membership)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource tidak ditemukan
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Konflik (mis. jadwal penuh)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
